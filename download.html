<h1>Enter Access Code to Download CV</h1>
<form id="downloadForm">
  <input type="password" id="accessCode" placeholder="Access Code" required>
  <button type="submit">Submit</button>
</form>
<p id="error" style="color:red; display:none;">Invalid code. Please try again.</p>

<script>
  document.getElementById('downloadForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const enteredCode = document.getElementById('accessCode').value;
    const validCode = '1411'; // Replace with your valid code
    if (enteredCode === validCode) {
      window.location.href = 'https://www.dropbox.com/scl/fi/hjvb15e6z3s7dwvwb8beq/hkhouryCV.pdf?rlkey=abcyw87y4c30kebo5yucccuf2&st=daozgvef&dl=1';
    } else {
      document.getElementById('error').style.display = 'block';
    }
  });
</script>
